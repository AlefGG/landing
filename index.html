<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#59B002" />
    <!-- BUG-067: per-page <meta name="description"> is emitted by Seo.tsx
         via react-helmet-async. Keeping a static tag here would leave two
         duplicate nodes per route and crawlers read the first one only. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geologica:wght@400&family=Nunito+Sans:ital,opsz,wght@0,6..12,300;0,6..12,400;0,6..12,700;0,6..12,800&family=Noto+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <!-- BUG-010: hero-bg.png is only used on "/" — avoid a global preload so that subpages don't log "preloaded but not used" warnings. -->
    <title>Эко-Ресурс — аренда и продажа биотуалетов в Алматы</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
