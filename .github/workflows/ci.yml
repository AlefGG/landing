name: CI (fast)

on:
  push:
    branches:
      - master
      - main
      - "feat/**"
      - "fix/**"
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  lint:
    # Wave-3 close (CQ-005 enabler + Group A merged): the 18-error
    # baseline (FE-CQ-001/002/003 + FE-RX-002..005 + FE-CQ-004) is now 0.
    # Strict mode active — lint failure blocks merge. Branch protection
    # required-checks updated separately via gh api PATCH (paired with
    # this PR).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm test
      - name: Run build-script tests
        run: npm run test:scripts

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Cache optimized images (Wave-2 FE-PF-002)
        uses: actions/cache@v4
        with:
          path: public/assets/images-optimized
          key: images-optimized-${{ hashFiles('public/assets/images/**') }}
          restore-keys: |
            images-optimized-
      - run: npm run build
      - name: Upload dist artifact (for downstream jobs)
        uses: actions/upload-artifact@v4
        with:
          name: landing-dist
          path: dist
          retention-days: 1

  size-budget:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: landing-dist
          path: dist
      - name: "Check bundle size (Wave-2 hard-fail)"
        run: npm run size:check
